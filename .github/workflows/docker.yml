name: "docker"
on:
  workflow_dispatch:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out"
        required: true
        type: string
      docker_tag:
        description: "Docker tag to publish"
        required: false
        default: ""
        type: string
      also_latest:
        description: "Also publish the latest Docker tag"
        required: false
        default: false
        type: boolean
jobs:
  bake:
    name: "build and pushing convco docker image"
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install multiarch/qemu-user-static
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes -c yes
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
      - name: "Login to Docker Container Repository"
        run: echo ${DOCKER_PASSWORD} | docker login -u ${DOCKER_USERNAME} --password-stdin
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: "build docker image"
        shell: bash
        env:
          TAG: ${{ inputs.docker_tag || '' }}
          LATEST: ${{ inputs.also_latest || (github.event_name != 'workflow_call' && github.ref == 'refs/heads/main') }}
        run: |
          set -ex
          docker buildx use "convco" \
          || docker buildx create --use --name "convco" --driver docker-container
          ARM64=true AMD64=true docker buildx bake --builder convco
